version: "3.8"

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    command: sh -c "npm install && npm run dev"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - DATABASE_URL=postgres://geget:devpassword@db:5432/geget?sslmode=disable
      - SMTP_HOST=localhost
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM=noreply@geget.org
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=geget
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=geget
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geget"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  frontend_node_modules:
